<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <meta name="description" content="Who's That Pokémon — devinez le Pokémon caché !" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>WHO'S THAT POKÉMON</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Fond animé ─────────────────────────────────────────── -->
  <div class="bg" aria-hidden="true">
    <div class="bg__orb bg__orb--1"></div>
    <div class="bg__orb bg__orb--2"></div>
    <div class="bg__orb bg__orb--3"></div>
    <div class="bg__grid"></div>
    <div class="bg__vignette"></div>
  </div>

  <!-- ── App ────────────────────────────────────────────────── -->
  <div class="app" id="app">

    <!-- Header -->
    <header class="header" role="banner">
      <div class="header__badge">
        <span class="header__dot" aria-hidden="true"></span>
        LIVE
      </div>
      <h1 class="header__title">WHO'S THAT<br/><em>POKÉMON</em></h1>
      <div class="header__actions">
        <button class="icon-btn" id="btn-lang" aria-label="Changer la langue" title="FR / EN">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span id="lang-label">FR</span>
        </button>
        <button class="icon-btn" id="btn-mute" aria-label="Couper le son">
          <svg id="icon-sound-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <svg id="icon-sound-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>
      </div>
    </header>

    <!-- Main -->
    <main class="main" role="main">

      <!-- Colonne gauche — écran -->
      <section class="panel panel--screen" aria-label="Écran du Pokémon">

        <!-- Stats bar -->
        <div class="stats-bar">
          <div class="stat">
            <span class="stat__value" id="score-correct">0</span>
            <span class="stat__label" id="lbl-correct">CORRECT</span>
          </div>
          <div class="stat stat--center">
            <div class="xp-ring" aria-hidden="true">
              <svg viewBox="0 0 56 56" width="56" height="56">
                <circle class="xp-ring__bg" cx="28" cy="28" r="24" />
                <circle class="xp-ring__fill" id="xp-ring-fill" cx="28" cy="28" r="24" />
              </svg>
              <span class="xp-ring__label" id="level-num">1</span>
            </div>
            <span class="stat__label" id="lbl-level">NIVEAU</span>
          </div>
          <div class="stat stat--right">
            <span class="stat__value" id="score-wrong">0</span>
            <span class="stat__label" id="lbl-wrong">RATÉ</span>
          </div>
        </div>

        <!-- Screen -->
        <div class="screen" id="screen" role="img" aria-label="Silhouette du Pokémon">
          <div class="screen__noise" aria-hidden="true"></div>
          <div class="screen__scanlines" aria-hidden="true"></div>

          <div class="screen__inner">
            <div class="pokemon-wrap" id="pokemon-wrap">
              <img id="pokemon-img" src="" alt="Silhouette du Pokémon" draggable="false" />
            </div>
          </div>

          <!-- Overlay status -->
          <div class="screen__status" id="screen-status" aria-live="polite">
            <span id="status-text"></span>
          </div>

          <!-- Corner deco -->
          <span class="screen__corner screen__corner--tl" aria-hidden="true"></span>
          <span class="screen__corner screen__corner--tr" aria-hidden="true"></span>
          <span class="screen__corner screen__corner--bl" aria-hidden="true"></span>
          <span class="screen__corner screen__corner--br" aria-hidden="true"></span>
        </div>

        <!-- Revealed name -->
        <div class="reveal-name" id="reveal-name" aria-live="assertive">
          <span id="pokemon-name"></span>
        </div>

      </section>

      <!-- Colonne droite — contrôles -->
      <section class="panel panel--controls" aria-label="Contrôles du jeu">

        <!-- Champ saisie -->
        <div class="field">
          <label class="field__label" id="input-label" for="guess-input">ENTREZ LE NOM</label>
          <div class="field__wrap">
            <input
              type="text"
              id="guess-input"
              class="field__input"
              autocomplete="off"
              spellcheck="false"
              inputmode="text"
              aria-label="Nom du Pokémon"
            />
            <button class="field__submit" id="btn-guess" aria-label="Valider">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
          </div>
        </div>

        <!-- Actions principales -->
        <div class="actions">
          <button class="btn btn--primary" id="btn-new">
            <span class="btn__icon">⟳</span>
            <span class="btn__text" id="lbl-new">NOUVEAU POKÉMON</span>
          </button>
        </div>

        <!-- Actions secondaires -->
        <div class="actions actions--secondary">
          <button class="btn btn--hint" id="btn-hint">
            <span class="btn__icon">💡</span>
            <span class="btn__text" id="lbl-hint">INDICE</span>
          </button>
          <button class="btn btn--reveal" id="btn-reveal">
            <span class="btn__icon">👁</span>
            <span class="btn__text" id="lbl-reveal">RÉVÉLER</span>
          </button>
        </div>

        <!-- XP bar linéaire (mobile) -->
        <div class="xp-bar-linear" aria-hidden="true">
          <div class="xp-bar-linear__track">
            <div class="xp-bar-linear__fill" id="xp-bar-fill"></div>
          </div>
          <span class="xp-bar-linear__label" id="xp-label">0 / 50 XP</span>
        </div>

        <!-- Historique mini -->
        <div class="history" id="history" aria-label="Dernières réponses" aria-live="polite">
          <!-- injecté dynamiquement -->
        </div>

      </section>

    </main>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Level up popup -->
  <div class="popup" id="popup-levelup" role="dialog" aria-modal="true" aria-label="Niveau supérieur" hidden>
    <div class="popup__backdrop"></div>
    <div class="popup__card">
      <div class="popup__glow" aria-hidden="true"></div>
      <p class="popup__eyebrow" id="popup-eyebrow">LEVEL UP</p>
      <p class="popup__level" id="popup-level">NIVEAU 2</p>
      <div class="popup__bar" aria-hidden="true"></div>
      <button class="popup__close" id="popup-close">OK</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
