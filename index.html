<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHO'S THAT POKÉMON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scanline"></div>
  <div class="noise"></div>

  <main class="pokedex">

    <!-- LEFT HALF -->
    <section class="pokedex__left">
      <div class="pokedex__lens-group">
        <div class="lens lens--big">
          <div class="lens__inner"></div>
          <div class="lens__glare"></div>
        </div>
        <div class="lens-dots">
          <div class="dot dot--red"></div>
          <div class="dot dot--yellow"></div>
          <div class="dot dot--green"></div>
        </div>
      </div>

      <div class="screen-wrapper">
        <div class="screen-label">DISPLAY / AFFICHAGE</div>
        <div class="screen" id="screen">
          <div class="screen__grid"></div>
          <div class="screen__corner tl"></div>
          <div class="screen__corner tr"></div>
          <div class="screen__corner bl"></div>
          <div class="screen__corner br"></div>
          <div class="silhouette-wrap">
            <img id="pokemon-img" src="" alt="Pokémon" />
          </div>
          <div class="screen__overlay" id="screen-overlay">
            <span class="screen__prompt" id="screen-prompt">?</span>
          </div>
        </div>

        <div class="type-bar" id="type-bar"></div>
      </div>

      <div class="speaker">
        <div class="speaker__lines">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </section>

    <!-- HINGE -->
    <div class="hinge">
      <div class="hinge__screw top"></div>
      <div class="hinge__screw bottom"></div>
    </div>

    <!-- RIGHT HALF -->
    <section class="pokedex__right">

      <div class="mini-screen" id="mini-screen">
        <div class="mini-screen__status" id="status-text">PRÊT</div>
        <div class="mini-screen__name" id="pokemon-name"></div>
        <div class="mini-screen__score">
          <span id="score-display">✓ 0 &nbsp;✗ 0</span>
        </div>
      </div>

      <div class="controls">
        <div class="input-group">
          <label class="input-label" id="input-label">ENTREZ LE NOM</label>
          <div class="input-wrap">
            <input type="text" id="guess-input" autocomplete="off" spellcheck="false" />
            <div class="input-cursor"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn--guess" id="btn-guess" onclick="Game.check()">
            <span class="btn__top">DEVINER</span>
          </button>
          <button class="btn btn--lang" id="btn-lang" onclick="Game.toggleLang()">
            <span class="btn__top">FR / EN</span>
          </button>
        </div>

        <button class="btn btn--new" id="btn-new" onclick="Game.newPokemon()">
          <span class="btn__top">— NOUVEAU POKÉMON —</span>
        </button>

        <div class="hint-row">
          <button class="btn btn--hint" onclick="Game.hint()">
            <span class="btn__top">INDICE</span>
          </button>
          <button class="btn btn--reveal" onclick="Game.reveal()">
            <span class="btn__top">RÉVÉLER</span>
          </button>
        </div>
      </div>

      <div class="dpad-area">
        <div class="dpad">
          <div class="dpad__h"></div>
          <div class="dpad__v"></div>
          <div class="dpad__center"></div>
        </div>
        <div class="dpad-buttons">
          <button class="circle-btn" id="circle-a">A</button>
          <button class="circle-btn" id="circle-b">B</button>
        </div>
      </div>

    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
