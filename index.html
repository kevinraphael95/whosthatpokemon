
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokédex - Who's That Pokémon</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet"><style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Orbitron',sans-serif;
background:radial-gradient(circle at top,#1a1a1a,#000);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.pokedex{
width:95%;
max-width:1000px;
background:linear-gradient(145deg,#e53935,#b71c1c);
border-radius:40px;
padding:20px;
box-shadow:0 25px 80px rgba(0,0,0,0.7);
position:relative;
}

.pokedex::before{
content:"";
position:absolute;
inset:10px;
border-radius:35px;
border:2px solid rgba(255,255,255,0.08);
pointer-events:none;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.lights{
display:flex;
gap:10px;
}

.light{
width:14px;height:14px;border-radius:50%;box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.blue{background:#4cc9f0;}
.red{background:#ff0054;}
.yellow{background:#ffd60a;}
.green{background:#80ed99;}

.title{
font-weight:800;
letter-spacing:2px;
opacity:0.9;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:10px;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr;}
}

.screen{
background:linear-gradient(180deg,#b7ffb7,#7dff7d);
border-radius:30px;
height:420px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
border:6px solid #111;
box-shadow:inset 0 0 30px rgba(0,0,0,0.4);
}

.screen::after{
content:"";
position:absolute;
inset:0;
background:repeating-linear-gradient(
0deg,
rgba(0,0,0,0.05),
rgba(0,0,0,0.05) 2px,
transparent 2px,
transparent 6px
);
}

img{
width:80%;
max-height:380px;
object-fit:contain;
filter:brightness(0) contrast(0);
transition:0.4s ease;
}

.reveal img{
filter:none;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0.8);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.panel{
background:rgba(10,10,10,0.85);
border-radius:30px;
padding:20px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
}

input{
width:100%;
padding:15px;
border-radius:15px;
border:none;
background:#111;
color:white;
font-size:16px;
outline:none;
border:1px solid #333;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
background:linear-gradient(145deg,#222,#000);
color:white;
font-weight:700;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px rgba(255,255,255,0.1);
}

.result{
text-align:center;
margin-top:10px;
font-weight:bold;
}

.name{
text-align:center;
font-size:20px;
margin-top:10px;
font-weight:800;
}

.badge{
display:inline-block;
padding:6px 12px;
margin:5px;
border-radius:20px;
background:#222;
border:1px solid #333;
font-size:12px;
}

.lang{
position:absolute;
top:15px;
right:15px;
background:#111;
color:white;
border:none;
padding:10px 12px;
border-radius:12px;
cursor:pointer;
}

</style></head>
<body><div class="pokedex"><button class="lang" onclick="toggleLang()">EN / FR</button>

<div class="top">
<div class="lights">
<div class="light blue"></div>
<div class="light red"></div>
<div class="light yellow"></div>
<div class="light green"></div>
</div>
<div class="title" id="title">WHO'S THAT POKÉMON</div>
</div><div class="grid"><div class="screen" id="screen">
<img id="img" />
</div><div class="panel">
<input id="guess" />
<button onclick="check()" id="btnGuess">GUESS</button>
<button onclick="newPokemon()" id="btnNew">NEW</button><div class="result" id="result"></div>
<div class="name" id="name"></div>
<div id="types"></div>
</div></div></div><script>

let current=null;
let lang="en";

const t={
 en:{title:"WHO'S THAT POKÉMON",guess:"GUESS",new:"NEW",correct:"CORRECT!",wrong:"Wrong"},
 fr:{title:"QUI EST CE POKÉMON ?",guess:"DEVINER",new:"NOUVEAU",correct:"BONNE RÉPONSE !",wrong:"Mauvaise réponse"}
};

function applyLang(){
 document.getElementById("title").innerText=t[lang].title;
 document.getElementById("btnGuess").innerText=t[lang].guess;
 document.getElementById("btnNew").innerText=t[lang].new;
 document.getElementById("guess").placeholder=lang=="en"?"Type name...":"Tape le nom...";
}

async function newPokemon(){
 const id=Math.floor(Math.random()*1025)+1;
 const res=await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
 const data=await res.json();
 const sp=await fetch(data.species.url).then(r=>r.json());
 current={data,sp};
 document.getElementById("img").src=data.sprites.other["official-artwork"].front_default;
 document.getElementById("screen").classList.remove("reveal");
 document.getElementById("result").innerText="";
 document.getElementById("name").innerText="";
 document.getElementById("types").innerHTML="";
 applyLang();
}

function toggleLang(){lang=lang=="en"?"fr":"en";applyLang();}

async function check(){
const g=document.getElementById("guess").value.toLowerCase();
const en=current.data.name.toLowerCase();
const fr=current.sp.names.find(n=>n.language.name=="fr")?.name.toLowerCase();
const ok=g==en||g==fr;
if(ok){
 document.getElementById("result").innerText=t[lang].correct;
 document.getElementById("screen").classList.add("reveal");
 document.getElementById("name").innerText=lang=="fr"?fr:en;
 document.getElementById("types").innerHTML=current.data.types.map(t=>`<span class='badge'>${t.type.name}</span>`).join('');
}else{
 document.getElementById("result").innerText=t[lang].wrong;
}
}

newPokemon();
applyLang();

</script></body>
</html>
