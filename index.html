<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <meta name="description" content="Who's That Pokémon — devinez le Pokémon caché !" />
  <title>WHO'S THAT POKÉMON</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scanline" aria-hidden="true"></div>
  <div class="noise"    aria-hidden="true"></div>

  <main class="pokedex" role="main">

    <!-- ── PANNEAU GAUCHE ───────────────────────────── -->
    <section class="pokedex__left" aria-label="Écran principal">

      <div class="pokedex__lens-group" aria-hidden="true">
        <div class="lens">
          <div class="lens__inner"></div>
          <div class="lens__glare"></div>
        </div>
        <div class="lens-dots">
          <div class="dot dot--red"></div>
          <div class="dot dot--yellow"></div>
          <div class="dot dot--green"></div>
        </div>
      </div>

      <img src="wtp-logo.png" class="wtp-logo" alt="Who's That Pokémon" />

      <div class="screen-wrapper">
        <div class="screen-label" id="screen-label" aria-hidden="true">DISPLAY / AFFICHAGE</div>

        <div class="screen" id="screen" role="img" aria-label="Silhouette du Pokémon">
          <div class="screen__grid" aria-hidden="true"></div>
          <span class="screen__corner screen__corner--tl" aria-hidden="true"></span>
          <span class="screen__corner screen__corner--tr" aria-hidden="true"></span>
          <span class="screen__corner screen__corner--bl" aria-hidden="true"></span>
          <span class="screen__corner screen__corner--br" aria-hidden="true"></span>

          <div class="silhouette-wrap">
            <img id="pokemon-img" src="" alt="Silhouette du Pokémon" draggable="false" />
          </div>

          <div class="screen__overlay" id="screen-overlay" aria-hidden="true">
            <span class="screen__prompt" id="screen-prompt">?</span>
          </div>
        </div>
      </div>

      <div class="speaker" aria-hidden="true">
        <div class="speaker__lines">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>

    </section>

    <!-- ── CHARNIÈRE ────────────────────────────────── -->
    <div class="hinge" aria-hidden="true">
      <div class="hinge__screw"></div>
      <div class="hinge__screw"></div>
    </div>

    <!-- ── PANNEAU DROIT ─────────────────────────────── -->
    <section class="pokedex__right" aria-label="Contrôles">

      <div class="mini-screen" id="mini-screen" aria-live="polite">
        <div class="mini-screen__status" id="status-text"></div>
        <div class="mini-screen__name"   id="pokemon-name"></div>
        <div class="xp-bar" aria-hidden="true">
          <div class="xp-bar__fill" id="xp-bar-fill"></div>
        </div>
        <div class="mini-screen__bottom-row">
          <div class="mini-screen__level" id="level-display">LVL 1  ·  0/50 XP</div>
          <div class="mini-screen__score"><span id="score-display">✓ 0 &nbsp;✗ 0</span></div>
        </div>
      </div>

      <div class="controls">

        <div class="input-group">
          <label class="input-label" id="input-label" for="guess-input">ENTREZ LE NOM</label>
          <div class="input-wrap">
            <input
              type="text"
              id="guess-input"
              autocomplete="off"
              spellcheck="false"
              inputmode="text"
              aria-label="Nom du Pokémon"
            />
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn--guess" id="btn-guess" aria-label="Valider la réponse">
            <span class="btn__top">DEVINER</span>
          </button>
          <button class="btn btn--lang" id="btn-lang" aria-label="Changer la langue">
            <span class="btn__top">FR / EN</span>
          </button>
          <button class="btn btn--mute" id="btn-mute" aria-label="Couper le son">
            <span class="btn__top">🔊</span>
          </button>
        </div>

        <button class="btn btn--new" id="btn-new" aria-label="Charger un nouveau Pokémon">
          <span class="btn__top">— NOUVEAU POKÉMON —</span>
        </button>

        <div class="hint-row">
          <button class="btn btn--hint" id="btn-hint" aria-label="Obtenir un indice">
            <span class="btn__top">INDICE</span>
          </button>
          <button class="btn btn--reveal" id="btn-reveal" aria-label="Révéler le Pokémon">
            <span class="btn__top">RÉVÉLER</span>
          </button>
        </div>

      </div>

      <div class="dpad-area" aria-hidden="true">
        <div class="dpad">
          <div class="dpad__h"></div>
          <div class="dpad__v"></div>
          <div class="dpad__center"></div>
        </div>
        <div class="dpad-buttons">
          <button class="circle-btn" id="circle-a" tabindex="-1">A</button>
          <button class="circle-btn" id="circle-b" tabindex="-1">B</button>
        </div>
      </div>

    </section>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Level up popup -->
  <div class="levelup-popup" id="popup-levelup" role="dialog" aria-modal="true" aria-label="Niveau supérieur">
    <div class="levelup-popup__inner">
      <div class="levelup-popup__title" id="popup-title">LEVEL UP</div>
      <div class="levelup-popup__level" id="popup-level">NIVEAU 2</div>
      <button class="levelup-popup__close" id="popup-close">OK</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
